<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>THE ARCHIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root {
    --gold: #ffcf5c;
    --gold-deep: #ff9a3d;
    --amber: #6b3d12;
    --cream: #fff6e4;
    --text: #3a2410;
    --text-soft: #6b4a24;
    --line: rgba(255,255,255,0.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100%; }

  body {
    font-family: 'Work Sans', sans-serif;
    color: var(--cream);
    position: relative;
    overflow-x: hidden;
    min-height: 100vh;

    background-color: #a86a1e;
    background-image:
      linear-gradient(180deg, rgba(60,30,5,0.35) 0%, rgba(80,40,5,0.15) 40%, rgba(120,60,10,0.35) 100%),
      url('sunset-bg.jpg');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    padding: 54px 22px 80px;
  }

  /* ── Ambient warm glow pulse ── */
  .glow {
    position: fixed;
    top: 22%;
    left: 50%;
    width: 380px;
    height: 380px;
    transform: translateX(-50%);
    background: radial-gradient(circle, rgba(255,230,160,0.35) 0%, rgba(255,200,100,0.12) 45%, transparent 75%);
    pointer-events: none;
    z-index: 0;
    animation: glowPulse 7s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
    50%      { opacity: 0.95; transform: translateX(-50%) scale(1.1); }
  }

  /* ── Drifting petals (daisy petal flecks) ── */
  .petal {
    position: fixed;
    top: -6vh;
    width: 9px; height: 9px;
    background: radial-gradient(circle at 35% 35%, #fffdf5, #ffdd8a 70%);
    border-radius: 50%;
    opacity: 0.8;
    pointer-events: none;
    z-index: 0;
    animation: petalFall linear infinite;
  }
  @keyframes petalFall {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.85; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(112vh) translateX(46px) rotate(240deg); opacity: 0; }
  }

  #app {
    position: relative;
    z-index: 2;
    max-width: 620px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 54px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(2.3rem, 8vw, 3.4rem);
    letter-spacing: 1px;
    color: var(--cream);
    text-shadow: 0 3px 24px rgba(80,40,0,0.55);
    line-height: 1.05;
  }

  header p {
    margin-top: 14px;
    font-size: 0.95rem;
    color: rgba(255,246,228,0.85);
    text-shadow: 0 1px 6px rgba(60,30,0,0.5);
    letter-spacing: 0.3px;
  }

  .divider {
    width: 60px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 24px auto 0;
    opacity: 0.8;
  }

  /* ── Entries ── */
  .entries { display: flex; flex-direction: column; gap: 22px; }

  .entry {
    display: block;
    text-decoration: none;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
  }
  .entry:nth-child(1) { animation-delay: 0.15s; }
  .entry:nth-child(2) { animation-delay: 0.30s; }
  .entry:nth-child(3) { animation-delay: 0.45s; }
  .entry:nth-child(4) { animation-delay: 0.60s; }
  .entry:nth-child(5) { animation-delay: 0.75s; }

  .entry-inner {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 26px 28px;
    border-radius: 18px;
    background: rgba(255,255,255,0.10);
    border: 1.5px solid var(--line);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: background 0.3s ease, border-color 0.3s ease, transform 0.25s ease, box-shadow 0.3s ease;
    box-shadow: 0 6px 24px rgba(60,30,0,0.18);
  }

  .entry-inner::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--gold), var(--gold-deep));
    border-radius: 3px 0 0 3px;
    transform: scaleY(0);
    transform-origin: center;
    transition: transform 0.3s ease;
  }

  .entry:hover .entry-inner {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,215,140,0.6);
    transform: translateX(4px);
    box-shadow: 0 10px 32px rgba(60,30,0,0.28);
  }
  .entry:hover .entry-inner::before { transform: scaleY(1); }

  .entry-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.15rem;
    letter-spacing: 0.5px;
    color: var(--cream);
    text-shadow: 0 1px 8px rgba(60,30,0,0.4);
    text-transform: uppercase;
  }

  .entry-arrow {
    font-size: 1.2rem;
    color: var(--gold);
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.25s ease, transform 0.25s ease;
    flex-shrink: 0;
  }
  .entry:hover .entry-arrow { opacity: 1; transform: translateX(0); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  footer {
    text-align: center;
    margin-top: 54px;
    font-size: 0.75rem;
    letter-spacing: 1.5px;
    color: rgba(255,246,228,0.6);
    text-shadow: 0 1px 6px rgba(60,30,0,0.4);
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
    animation-delay: 0.9s;
  }

  @media (max-width: 480px) {
    .entry-inner { padding: 22px 20px; }
    .entry-title { font-size: 1.02rem; }
  }
</style>
</head>
<body>

  <div class="glow"></div>

  <div id="app">

    <header>
      <h1>THE ARCHIVE</h1>
      <p>A quiet field of questions, waiting to be walked through.</p>
      <div class="divider"></div>
    </header>

    <div class="entries">
      <a class="entry" href="https://lostsky-droid.github.io/LostSky.github.io/land_of_india.html" target="_blank" rel="noopener">
        <div class="entry-inner">
          <span class="entry-title">LAND OF INDIA</span>
          <span class="entry-arrow">↗</span>
        </div>
      </a>

      <a class="entry" href="https://lostsky-droid.github.io/LostSky.github.io/understanding_india_mcq.html" target="_blank" rel="noopener">
        <div class="entry-inner">
          <span class="entry-title">BOOK MCQ'S</span>
          <span class="entry-arrow">↗</span>
        </div>
      </a>
    </div>

    <footer>MAINTAINED BY HITESH</footer>
  </div>

<script>
  const petalCount = 16;
  for (let i = 0; i < petalCount; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal';
    petal.style.left = Math.random() * 100 + 'vw';
    petal.style.animationDuration = (12 + Math.random() * 9) + 's';
    petal.style.animationDelay = (Math.random() * 10) + 's';
    document.body.appendChild(petal);
  }
</script>
</body>
</html>
